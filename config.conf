# Live Wallpaper Keeper configuration

# The live wallpaper component to protect. This is what your wallpaper_info.xml
# points at. Yours (from wallpaper_info.xml) is:
WALLPAPER_COMPONENT=com.graytsar.livewallpaper/.service.VideoWallpaperService

# The package that provides the live wallpaper (for keeping it alive).
WALLPAPER_PACKAGE=com.graytsar.livewallpaper

# How to decide the current wallpaper is "healthy" and worth backing up:
# the wallpaper_info.xml must contain this string (a fragment of the component).
HEALTHY_MARKER=VideoWallpaperService

# Seconds to wait after boot before checking/restoring (let the system settle).
BOOT_DELAY=40

# 1 = after restoring, also try to re-apply the wallpaper via the framework
#     so it takes effect without a second reboot.
REAPPLY_AFTER_RESTORE=1
